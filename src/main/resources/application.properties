spring.application.name=heritage-link
server.port=8080

# H2 in-memory database. resets on every restart
spring.datasource.url=jdbc:h2:mem:heritagelink;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# mediation threshold
heritagelink.mediation.sentimental-threshold=7